<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Играй в Tappy Bird и Tower Rush! Бонусы по промокоду GODDYER." />
  <meta name="theme-color" content="#0a0e1a" />
  <meta property="og:title" content="🎮 GAME ZONE" />
  <meta property="og:description" content="🎁 Бонусы доступны по промокоду GODDYER" />
  <meta property="og:image" content="assets/bg.png" />
  <meta property="og:type" content="website" />
  <title>🎮 GAME ZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="bg-overlay"></div>

    <div class="content">

      <!-- Promo badge -->
      <div class="promo">
        <p class="promo-text">🎁 Бонусы доступны по промокоду</p>
        <span class="promo-code">GODDYER</span>
      </div>

      <!-- Game 1: Tappy Bird -->
      <div class="game-card">
        <div class="game-card__header">
          <img src="assets/logo.png" alt="Tappy Bird" class="game-icon" width="72" height="72" />
          <h2 class="game-title">🐦 TAPPY BIRD</h2>
        </div>
        <a
          href="https://lkyr.cc/edbfe9"
          class="cta-btn"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Начать Tappy Bird"
        >
          <span class="cta-main">👇 НАЧАТЬ ИГРУ</span>
          <span class="cta-sub">(Нажмите, чтобы открыть игру)</span>
        </a>
      </div>

      <!-- Game 2: Tower Rush -->
      <div class="game-card">
        <img src="assets/tower.jpg" alt="Tower Rush" class="game-banner" />
        <div class="game-card__body">
          <h2 class="game-title game-title--dark">🏗️ TOWER RUSH</h2>
          <a
            href="https://lkyr.cc/edbfe9"
            class="cta-btn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Начать Tower Rush"
          >
            <span class="cta-main">👇 НАЧАТЬ ИГРУ</span>
            <span class="cta-sub">(Нажмите, чтобы открыть игру)</span>
          </a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
